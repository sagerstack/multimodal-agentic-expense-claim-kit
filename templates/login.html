<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Expense AI | Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/output.css">
  <style>
    .glass-panel {
      background: rgba(25, 37, 64, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .neon-glow-focus:focus-within {
      box-shadow: 0 0 15px -3px rgba(98, 250, 227, 0.3);
    }
    .intelligence-pulse {
      width: 8px;
      height: 8px;
      background-color: #62fae3;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px #62fae3;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body flex items-center justify-center min-h-screen relative overflow-hidden selection:bg-primary/30">

<!-- Background glow effects -->
<div class="absolute inset-0 z-0 pointer-events-none">
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 blur-[150px] rounded-full"></div>
  <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#cc97ff 0.5px, transparent 0.5px); background-size: 32px 32px;"></div>
</div>

<main class="relative z-10 w-full max-w-[480px] px-6">
  <div class="glass-panel border-t border-outline-variant/15 p-8 md:p-12 rounded-xl flex flex-col items-center">

    <!-- Header / Branding -->
    <header class="mb-10 text-center">
      <div class="flex items-center justify-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary to-primary-dim flex items-center justify-center">
          <span class="material-symbols-outlined text-on-primary text-xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
        </div>
        <h1 class="font-manrope text-3xl font-extrabold tracking-tight bg-gradient-to-r from-[#cc97ff] to-[#9c48ea] bg-clip-text text-transparent">
          Expense AI
        </h1>
      </div>
      <div class="flex items-center justify-center gap-2">
        <span class="intelligence-pulse"></span>
        <p class="text-on-surface-variant text-sm font-medium tracking-wide uppercase">Intelligent Claims Processing</p>
      </div>
    </header>

    <!-- Login Form -->
    <form method="post" action="/login" class="w-full space-y-6">

      <!-- Username field -->
      <div class="space-y-2 group">
        <label class="block font-inter text-xs font-bold tracking-widest text-on-surface-variant uppercase ml-1" for="username">Username</label>
        <div class="relative neon-glow-focus transition-all duration-300 rounded-xl">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" style="font-size: 20px;">alternate_email</span>
          <input
            class="w-full bg-surface-container border border-outline-variant/30 focus:ring-1 focus:ring-secondary/50 focus:border-secondary/50 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant transition-all outline-none"
            id="username"
            name="username"
            placeholder="your.username"
            type="text"
            value="{{ username }}"
            autocomplete="username"
            required
          />
        </div>
      </div>

      <!-- Password field -->
      <div class="space-y-2 group">
        <label class="block font-inter text-xs font-bold tracking-widest text-on-surface-variant uppercase ml-1" for="password">Password</label>
        <div class="relative neon-glow-focus transition-all duration-300 rounded-xl">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" style="font-size: 20px;">lock</span>
          <input
            class="w-full bg-surface-container border border-outline-variant/30 focus:ring-1 focus:ring-secondary/50 focus:border-secondary/50 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant transition-all outline-none"
            id="password"
            name="password"
            placeholder="••••••••••••"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>
      </div>

      <!-- Error message -->
      {% if error %}
      <div class="flex items-center gap-2 px-4 py-3 rounded-xl bg-error/10 border border-error/30">
        <span class="material-symbols-outlined text-error text-sm" style="font-size: 18px;">error</span>
        <p class="text-error text-sm font-medium">{{ error }}</p>
      </div>
      {% endif %}

      <!-- Remember device + forgot password row -->
      <div class="flex items-center justify-between px-1">
        <label class="flex items-center gap-2 cursor-pointer group">
          <input
            class="w-4 h-4 rounded-sm border-outline-variant bg-surface-container text-primary focus:ring-primary/30 focus:ring-offset-0 transition-all"
            type="checkbox"
            name="remember_me"
            value="true"
          />
          <span class="text-xs text-on-surface-variant group-hover:text-on-surface transition-colors">Remember this device</span>
        </label>
      </div>

      <!-- Submit button -->
      <button
        class="w-full relative group overflow-hidden bg-gradient-to-br from-primary to-primary-dim py-4 rounded-xl text-on-primary font-manrope font-extrabold text-sm tracking-widest uppercase transition-transform active:scale-[0.98] hover:shadow-[0_0_20px_rgba(204,151,255,0.4)]"
        type="submit"
      >
        <div class="absolute inset-0 bg-gradient-to-r from-secondary/0 via-secondary/20 to-secondary/0 -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
        <span class="relative z-10 flex items-center justify-center gap-2">
          Sign In
          <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
        </span>
      </button>

    </form>

    <!-- Footer -->
    <footer class="mt-10 w-full pt-8 border-t border-outline-variant/10 flex flex-col items-center gap-4">
      <div class="flex gap-6">
        <button class="p-2 text-outline-variant hover:text-on-surface transition-colors" title="System Status">
          <span class="material-symbols-outlined" style="font-size: 20px;">hub</span>
        </button>
        <button class="p-2 text-outline-variant hover:text-on-surface transition-colors" title="Technical Support">
          <span class="material-symbols-outlined" style="font-size: 20px;">support_agent</span>
        </button>
      </div>
    </footer>

  </div>

  <div class="mt-6 text-center px-4">
    <p class="text-[10px] text-outline font-inter tracking-widest uppercase opacity-50">
      Expense AI &bull; SUTD
    </p>
  </div>
</main>

<!-- Decorative corner lines -->
<div class="fixed bottom-0 left-0 p-8 hidden lg:block opacity-40">
  <div class="flex flex-col gap-1">
    <div class="w-12 h-[2px] bg-primary"></div>
    <div class="w-8 h-[2px] bg-secondary"></div>
    <div class="w-16 h-[2px] bg-outline-variant"></div>
  </div>
</div>

</body>
</html>
