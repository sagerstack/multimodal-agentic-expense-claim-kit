<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense AI | {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/output.css">
  <script src="/static/js/htmx.min.js"></script>
  <script src="/static/js/sse.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/js/alpine.min.js" defer></script>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-secondary/30">

<!-- TopNavBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-16 bg-[#060e20] shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
  <div class="flex items-center gap-8">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-primary-dim flex items-center justify-center">
        <span class="material-symbols-outlined text-on-primary text-sm" style="font-variation-settings: 'FILL' 1;">bolt</span>
      </div>
      <span class="text-xl font-bold bg-gradient-to-r from-[#cc97ff] to-[#62fae3] bg-clip-text text-transparent font-manrope tracking-tight">Expense AI</span>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <!-- Profile avatar with logout dropdown (Alpine.js) -->
    <div class="relative" x-data="{ open: false }" @click.outside="open = false">
      <button @click="open = !open"
              class="h-8 w-8 rounded-full border border-outline-variant/30 flex items-center justify-center bg-[#192540] text-[#dee5ff] text-xs font-bold hover:border-secondary/50 transition-colors">
        {{ (displayName or 'EA')[:2] | upper }}
      </button>
      <div x-show="open" x-cloak
           class="absolute right-0 mt-2 w-52 rounded-xl bg-[#0f1930] border border-outline-variant/20 shadow-[0_8px_32px_rgba(0,0,0,0.5)] z-50 overflow-hidden">
        <div class="px-4 py-3 border-b border-outline-variant/10">
          <p class="text-on-surface text-sm font-semibold font-manrope">{{ displayName or '' }}</p>
          <p class="text-on-surface-variant text-xs capitalize mt-0.5">{{ userRole or '' }}</p>
        </div>
        <a href="/logout"
           class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:text-on-surface hover:bg-surface-bright transition-colors text-sm">
          <span class="material-symbols-outlined text-base">logout</span>
          Logout
        </a>
      </div>
    </div>
  </div>
</header>

<!-- SideNavBar -->
<aside class="fixed left-0 top-0 h-full flex flex-col py-8 bg-[#091328] w-64 hidden md:flex z-40">
  <div class="px-6 mb-10 mt-16">
    <button hx-post="/chat/reset" hx-swap="none" hx-confirm="Start a new expense? Current chat history will be cleared."
            class="w-full py-3 px-4 rounded-xl bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold text-sm transition-all hover:shadow-[0_0_20px_rgba(204,151,255,0.4)] active:scale-95 flex items-center justify-center gap-2">
      <span class="material-symbols-outlined text-sm">add</span>
      New Expense
    </button>
  </div>
  <nav class="flex-1 space-y-1">
    <!-- Claims — visible to all roles -->
    <a href="/"
       class="flex items-center gap-3 {% if activePage == 'chat' %}bg-[#1f2b49] text-[#62fae3] shadow-[0_0_15px_rgba(98,250,227,0.2)]{% else %}text-[#dee5ff] opacity-70 hover:opacity-100 hover:bg-surface-bright{% endif %} rounded-r-full py-3 px-6 transition-all duration-200 ease-in-out font-inter text-sm font-medium tracking-wide">
      <span class="material-symbols-outlined">description</span>
      Claims
    </a>
    <!-- Reviewer-only pages -->
    {% if userRole == "reviewer" %}
    <a href="/manage"
       class="flex items-center gap-3 {% if activePage == 'manage' %}bg-[#1f2b49] text-[#62fae3] shadow-[0_0_15px_rgba(98,250,227,0.2)]{% else %}text-[#dee5ff] opacity-70 hover:opacity-100 hover:bg-surface-bright{% endif %} rounded-r-full py-3 px-6 transition-all duration-200 ease-in-out font-inter text-sm font-medium tracking-wide">
      <span class="material-symbols-outlined">checklist</span>
      Manage
    </a>
    <a href="/analytics"
       class="flex items-center gap-3 {% if activePage == 'analytics' %}bg-[#1f2b49] text-[#62fae3] shadow-[0_0_15px_rgba(98,250,227,0.2)]{% else %}text-[#dee5ff] opacity-70 hover:opacity-100 hover:bg-surface-bright{% endif %} rounded-r-full py-3 px-6 transition-all duration-200 ease-in-out font-inter text-sm font-medium tracking-wide">
      <span class="material-symbols-outlined">monitoring</span>
      Analytics
    </a>
    {% endif %}
  </nav>
</aside>

<!-- Main Content Area -->
<main class="md:ml-64 pt-16 h-screen overflow-hidden bg-surface">
  {% block content %}{% endblock %}
</main>

<!-- Global Error Toast -->
<div id="errorToastContainer" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none" style="max-width: 28rem;"></div>

<script>
(function() {
  function showErrorToast(message) {
    var container = document.getElementById('errorToastContainer');
    if (!container) return;
    var toast = document.createElement('div');
    toast.className = 'pointer-events-auto flex items-start gap-3 p-4 rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] border border-error/30 bg-[#1a0a0e] text-error animate-[slideUp_0.3s_ease-out]';
    toast.innerHTML =
      '<span class="material-symbols-outlined text-lg flex-shrink-0 mt-0.5" style="font-variation-settings: \'FILL\' 1;">error</span>' +
      '<div class="flex-1 min-w-0">' +
        '<p class="text-xs font-bold uppercase tracking-widest text-error/80 mb-1">Error</p>' +
        '<p class="text-sm text-on-surface leading-relaxed break-words">' + message + '</p>' +
      '</div>' +
      '<button onclick="this.parentElement.remove()" class="text-error/50 hover:text-error flex-shrink-0">' +
        '<span class="material-symbols-outlined text-base">close</span>' +
      '</button>';
    container.appendChild(toast);
    setTimeout(function() {
      if (toast.parentElement) {
        toast.style.transition = 'opacity 0.3s ease-out';
        toast.style.opacity = '0';
        setTimeout(function() { toast.remove(); }, 300);
      }
    }, 10000);
  }

  window.showErrorToast = showErrorToast;

  // Catch SSE error events
  document.body.addEventListener('sse:error', function(e) {
    showErrorToast(e.detail || 'Stream connection error');
  });

  // Catch HTMX request errors
  document.body.addEventListener('htmx:responseError', function(e) {
    var status = e.detail.xhr ? e.detail.xhr.status : 'unknown';
    var url = e.detail.pathInfo ? e.detail.pathInfo.requestPath : '';
    showErrorToast('Request failed (' + status + '): ' + url);
  });

  document.body.addEventListener('htmx:sendError', function(e) {
    var url = e.detail.pathInfo ? e.detail.pathInfo.requestPath : '';
    showErrorToast('Network error — could not reach server: ' + url);
  });

  // Catch unhandled JS errors
  window.addEventListener('error', function(e) {
    if (e.message && !e.message.includes('ResizeObserver')) {
      showErrorToast(e.message);
    }
  });

  // Catch unhandled promise rejections
  window.addEventListener('unhandledrejection', function(e) {
    var msg = e.reason ? (e.reason.message || String(e.reason)) : 'Unhandled promise rejection';
    showErrorToast(msg);
  });
})();
</script>

<style>
@keyframes slideUp {
  from { transform: translateY(1rem); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>

{% block scripts %}{% endblock %}
</body>
</html>
