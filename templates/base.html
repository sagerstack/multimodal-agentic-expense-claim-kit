<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognitive Atelier | {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/output.css">
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/sse.js" defer></script>
  <script src="/static/js/alpine.min.js" defer></script>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-secondary/30">

<!-- TopNavBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-16 bg-[#060e20] shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
  <div class="flex items-center gap-8">
    <span class="text-xl font-bold bg-gradient-to-r from-[#cc97ff] to-[#62fae3] bg-clip-text text-transparent font-manrope tracking-tight">Cognitive Atelier</span>
  </div>
  <div class="flex items-center gap-4">
    <button class="scale-95 active:scale-90 transition-transform text-[#dee5ff] opacity-70 hover:text-[#62fae3]">
      <span class="material-symbols-outlined">notifications</span>
    </button>
    <button class="scale-95 active:scale-90 transition-transform text-[#dee5ff] opacity-70 hover:text-[#62fae3]">
      <span class="material-symbols-outlined">settings</span>
    </button>
    <div class="h-8 w-8 rounded-full overflow-hidden border border-outline-variant/30 flex items-center justify-center bg-[#192540] text-[#dee5ff] text-xs font-bold">
      CA
    </div>
  </div>
</header>

<!-- SideNavBar -->
<aside class="fixed left-0 top-0 h-full flex flex-col py-8 bg-[#091328] w-64 hidden md:flex z-40">
  <div class="px-6 mb-10 mt-16">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-primary-dim flex items-center justify-center">
        <span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">bolt</span>
      </div>
      <div>
        <h3 class="font-body text-sm font-bold tracking-wide text-on-surface">Luminous Intelligence</h3>
        <p class="text-[10px] text-secondary opacity-80 uppercase tracking-[0.2em]">Expense Engine Active</p>
      </div>
    </div>
    <a href="/" class="w-full py-3 px-4 rounded-xl bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold text-sm transition-all hover:shadow-[0_0_20px_rgba(204,151,255,0.4)] active:scale-95 flex items-center justify-center gap-2">
      <span class="material-symbols-outlined text-sm">add</span>
      New Expense
    </a>
  </div>
  <nav class="flex-1 space-y-1">
    <a href="/"
       class="flex items-center gap-3 py-3 px-6 transition-all duration-200 ease-in-out font-body text-sm font-medium tracking-wide
              {% if activePage == 'chat' %}bg-[#1f2b49] text-[#62fae3] rounded-r-full shadow-[0_0_15px_rgba(98,250,227,0.2)]{% else %}text-[#dee5ff] opacity-50 hover:bg-[#192540] hover:opacity-100{% endif %}">
      <span class="material-symbols-outlined">chat_spark</span>
      Chat AI
    </a>
    <a href="/dashboard"
       class="flex items-center gap-3 py-3 px-6 transition-all duration-200 ease-in-out font-body text-sm font-medium tracking-wide
              {% if activePage == 'dashboard' %}bg-[#1f2b49] text-[#62fae3] rounded-r-full shadow-[0_0_15px_rgba(98,250,227,0.2)]{% else %}text-[#dee5ff] opacity-50 hover:bg-[#192540] hover:opacity-100{% endif %}">
      <span class="material-symbols-outlined">insert_chart</span>
      Dashboard
    </a>
    <a href="/audit"
       class="flex items-center gap-3 py-3 px-6 transition-all duration-200 ease-in-out font-body text-sm font-medium tracking-wide
              {% if activePage == 'audit' %}bg-[#1f2b49] text-[#62fae3] rounded-r-full shadow-[0_0_15px_rgba(98,250,227,0.2)]{% else %}text-[#dee5ff] opacity-50 hover:bg-[#192540] hover:opacity-100{% endif %}">
      <span class="material-symbols-outlined">verified_user</span>
      Audit Log
    </a>
    <a href="#"
       class="flex items-center gap-3 py-3 px-6 transition-all duration-200 ease-in-out font-body text-sm font-medium tracking-wide
              {% if activePage == 'review' %}bg-[#1f2b49] text-[#62fae3] rounded-r-full shadow-[0_0_15px_rgba(98,250,227,0.2)]{% else %}text-[#dee5ff] opacity-50 hover:bg-[#192540] hover:opacity-100{% endif %}">
      <span class="material-symbols-outlined">receipt_long</span>
      Review
    </a>
  </nav>
  <div class="px-6 mt-auto">
    <a href="#" class="flex items-center gap-3 text-[#dee5ff] opacity-50 py-3 hover:opacity-100 transition-all font-body text-sm font-medium tracking-wide">
      <span class="material-symbols-outlined">sensors</span>
      System Status
      <div class="intelligence-pulse ml-auto"></div>
    </a>
  </div>
</aside>

<!-- Main Content Area -->
<main class="md:ml-64 pt-16 h-screen overflow-hidden bg-surface">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
