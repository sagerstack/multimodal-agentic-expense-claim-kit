services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      POSTGRES_HOST: postgres
      QDRANT_HOST: qdrant
      SEQ_INGESTION_URL: http://seq:80/api/events/raw
      SEQ_PASSWORD: ${SEQ_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      mcp-rag:
        condition: service_healthy
      mcp-db:
        condition: service_healthy
      mcp-currency:
        condition: service_healthy
      mcp-email:
        condition: service_healthy
      seq:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - ./static:/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic_claims"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  mcp-rag:
    build: ./mcp_servers/rag
    platform: linux/amd64
    environment:
      FASTMCP_HOST: 0.0.0.0
      QDRANT_URL: http://qdrant:6333
      COLLECTION_NAME: expense_policies
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HOME: /root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./src/agentic_claims/policy:/app/policy:ro
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8000/mcp | grep -qE '^[0-9]+$'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  mcp-db:
    build: ./mcp_servers/db
    environment:
      FASTMCP_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8000/mcp | grep -qE '^[0-9]+$'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  mcp-currency:
    build: ./mcp_servers/currency
    environment:
      FASTMCP_HOST: 0.0.0.0
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8000/mcp | grep -qE '^[0-9]+$'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  mcp-email:
    build: ./mcp_servers/email
    environment:
      FASTMCP_HOST: 0.0.0.0
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8000/mcp | grep -qE '^[0-9]+$'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  seq:
    image: datalust/seq:latest
    container_name: seq
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"
      - "5342:5341"
    volumes:
      - seq_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  qdrant_data:
  seq_data:
